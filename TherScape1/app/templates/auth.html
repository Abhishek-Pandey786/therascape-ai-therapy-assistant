<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheraScape - Login & Registration</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/landing.css') }}">
    <style>
        /* Ensure full page layout */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        body {
            min-height: 100vh;
            position: relative;
        }
        
        .auth-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(20px);
            width: 100%;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-radius: 25px;
            background: #f5f5f5;
            padding: 4px;
        }
        
        .auth-tab {
            flex: 1;
            padding: 12px 20px;
            text-align: center;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .auth-tab.active {
            background: var(--primary-color);
            color: white;
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: var(--on-surface);
        }
        
        .form-input {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
            box-sizing: border-box;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: white;
        }
        
        .auth-button {
            width: 100%;
            padding: 18px 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .auth-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(46, 125, 50, 0.3);
        }
        
        .auth-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 10px;
            padding: 10px;
            background: #ffebee;
            border-radius: 5px;
            display: none;
        }
        
        .success-message {
            color: #2e7d32;
            font-size: 14px;
            margin-top: 10px;
            padding: 10px;
            background: #e8f5e8;
            border-radius: 5px;
            display: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Animated Forest Background -->
    <div class="forest-background">
        <div class="forest-layers">
            <div class="forest-layer forest-layer-1"></div>
            <div class="forest-layer forest-layer-2"></div>
            <div class="forest-layer forest-layer-3"></div>
        </div>
        <div class="forest-particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>
        <div class="sunlight-rays"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>TheraScape</h1>
                <p>Your AI Therapy Assistant</p>
            </div>
            
            <div class="auth-tabs">
                <div class="auth-tab {% if mode == 'login' %}active{% endif %}" onclick="switchTab('login')">Login</div>
                <div class="auth-tab {% if mode == 'register' %}active{% endif %}" onclick="switchTab('register')">Register</div>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm" class="auth-form {% if mode == 'login' or not mode %}active{% endif %}">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" class="form-input" placeholder="Enter your email address" required>
                </div>
                
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="auth-button">
                    <span class="material-icons" style="vertical-align: middle; margin-right: 8px;">login</span>
                    Login
                </button>
                
                <div class="loading" id="loginLoading">
                    <div class="spinner"></div>
                    <p>Signing you in...</p>
                </div>
                
                <div class="error-message" id="loginError"></div>
                <div class="success-message" id="loginSuccess"></div>
            </form>
            
            <!-- Registration Form -->
            <form id="registerForm" class="auth-form {% if mode == 'register' %}active{% endif %}">
                <div class="form-group">
                    <label for="registerName">Name</label>
                    <input type="text" id="registerName" class="form-input" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" class="form-input" placeholder="Enter your email address" required>
                </div>
                
                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" class="form-input" placeholder="Create a secure password" required>
                </div>
                
                <button type="submit" class="auth-button">
                    <span class="material-icons" style="vertical-align: middle; margin-right: 8px;">person_add</span>
                    Register
                </button>
                
                <div class="loading" id="registerLoading">
                    <div class="spinner"></div>
                    <p>Creating your account...</p>
                </div>
                
                <div class="error-message" id="registerError"></div>
                <div class="success-message" id="registerSuccess"></div>
            </form>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            // Update tab styles
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + 'Form').classList.add('active');
            
            // Clear messages
            clearMessages();
        }
        
        function clearMessages() {
            document.querySelectorAll('.error-message, .success-message').forEach(msg => {
                msg.style.display = 'none';
                msg.textContent = '';
            });
        }
        
        function showMessage(type, elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.style.display = 'block';
        }
        
        function toggleLoading(formType, show) {
            const loading = document.getElementById(formType + 'Loading');
            const button = document.querySelector(`#${formType}Form button[type="submit"]`);
            
            if (show) {
                loading.style.display = 'block';
                button.disabled = true;
            } else {
                loading.style.display = 'none';
                button.disabled = false;
            }
        }
        
        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessages();
            toggleLoading('login', true);
            
            const formData = {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            };
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('success', 'loginSuccess', 'Login successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = '/chat';
                    }, 1500);
                } else {
                    showMessage('error', 'loginError', data.message || 'Login failed');
                }
            } catch (error) {
                showMessage('error', 'loginError', 'Connection error. Please try again.');
            } finally {
                toggleLoading('login', false);
            }
        });
        
        // Registration form handler
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessages();
            toggleLoading('register', true);
            
            const formData = {
                name: document.getElementById('registerName').value,
                email: document.getElementById('registerEmail').value,
                password: document.getElementById('registerPassword').value
            };
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('success', 'registerSuccess', 'Registration successful! Redirecting to login...');
                    setTimeout(() => {
                        // Force a full page reload to ensure proper rendering
                        window.location.href = '/auth?mode=login&email=' + encodeURIComponent(formData.email);
                    }, 2000);
                } else {
                    showMessage('error', 'registerError', data.message || 'Registration failed');
                }
            } catch (error) {
                showMessage('error', 'registerError', 'Connection error. Please try again.');
            } finally {
                toggleLoading('register', false);
            }
        });
        
        // Ensure proper page rendering
        document.addEventListener('DOMContentLoaded', function() {
            // Force a repaint to ensure proper rendering
            document.body.style.display = 'none';
            document.body.offsetHeight; // Trigger reflow
            document.body.style.display = '';
            
            // Ensure we're not in an iframe or partial context
            if (window.top !== window.self) {
                window.top.location = window.location;
            }
            
            // Handle URL parameters for auto-filling login form
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            const mode = urlParams.get('mode');
            
            if (mode === 'login' && email) {
                switchTab('login');
                document.getElementById('loginEmail').value = decodeURIComponent(email);
                // Remove URL parameters for clean state
                window.history.replaceState({}, document.title, '/auth');
            }
        });
        
        // Handle page navigation properly
        window.addEventListener('beforeunload', function() {
            // Clear any cached states
            sessionStorage.removeItem('partial_load');
        });
    </script>
</body>
</html>
